<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .card {
        background: rgba(255,255,255,0.9);
        padding: 40px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        z-index: 1;
    }

    h1 {
        color: #ff4d6d;
        margin-bottom: 10px;
    }

    p {
        color: #555;
        font-size: 18px;
        line-height: 1.6;
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 50px;
        background: #ff4d6d;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
    }

    .heart {
        position: absolute;
        color: rgba(255,255,255,0.8);
        font-size: 25px;
        animation: float 8s linear infinite;
    }

    @keyframes float {
        from {
            transform: translateY(100vh);
            opacity: 0;
        }
        20% {
            opacity: 1;
        }
        to {
            transform: translateY(-100px);
            opacity: 0;
        }
    }
</style>
</head>
<body>

<div class="card">
    <h1>❤️ I Love You, Haruka ❤️</h1>
    <p>
        Every day with you makes my world brighter.<br>
        Thank you for being in my life.<br><br>
        You make me smile more than anyone else.
    </p>

    <button onclick="showMessage()">
        Click Me ❤️
    </button>
</div>

<script>
function showMessage() {
    alert("No matter where life takes us, I will always care about you ❤️");
}

// Floating hearts
for (let i = 0; i < 20; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    heart.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
